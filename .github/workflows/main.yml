name: Build Swap APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Node.js 20 ची वॉर्निंग घालवण्यासाठी खालील लाईन टाकली आहे
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Download gradle-wrapper.jar if it doesn't exist
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -L https://repo.gradle.org/gradle/gradle-distributions/gradle-8.4-bin.zip -o gradle-8.4-bin.zip
            unzip -j gradle-8.4-bin.zip "gradle-8.4/lib/gradle-wrapper.jar" -d gradle/wrapper/
            rm gradle-8.4-bin.zip
            echo "gradle-wrapper.jar downloaded successfully"
          fi

      # सर्वात महत्त्वाचे: Gradle ला रन करण्याची परमिशन देणे
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 'gradle' ऐवजी प्रोजेक्टचे स्वतःचे './gradlew' वापरणे
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwapApp-debug
          # APK शोधण्यासाठी अचूक पाथ (Path)
          path: app/build/outputs/apk/debug/**/*.apk
          if-no-files-found: warn
