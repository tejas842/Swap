name: Build Swap APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Note: The manual Android SDK steps have been removed. 
      # ubuntu-latest already has ANDROID_HOME configured out of the box!

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        # If your project uses a Gradle wrapper, `./gradlew assembleDebug` is highly recommended over `gradle`
        run: gradle assembleDebug --stacktrace

      # Removed the "Find APK" step to prevent Exit Code 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwapApp-debug
          path: |
            **/outputs/apk/**/*.apk
          if-no-files-found: warn
          
